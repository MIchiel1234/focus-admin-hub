<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin — Study Dashboard</title>
    <meta name="description" content="Admin study dashboard built with TanStack Start." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230a0a14'/%3E%3Ctext x='50%25' y='54%25' font-family='system-ui' font-size='34' font-weight='700' text-anchor='middle' fill='%23e879f9'%3EA%3C/text%3E%3C/svg%3E" />
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #0a0a14; color: #e5e7eb;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
      .wrap { min-height: 100%; display: grid; place-items: center; padding: 2rem; }
      .card { max-width: 560px; text-align: center; }
      h1 { font-size: 2rem; margin: 0 0 .5rem;
        background: linear-gradient(135deg,#e879f9,#22d3ee,#fbbf24);
        -webkit-background-clip: text; background-clip: text; color: transparent; }
      p { color: #9ca3af; line-height: 1.6; }
      a.btn { display: inline-block; margin-top: 1.25rem; padding: .75rem 1.25rem;
        border-radius: .75rem; text-decoration: none; font-weight: 600;
        color: #0a0a14; background: linear-gradient(135deg,#e879f9,#22d3ee,#fbbf24);
        box-shadow: 0 10px 30px -10px rgba(232,121,249,.5); }
      code { background: #1a1a2e; padding: .15rem .4rem; border-radius: .35rem; color: #e879f9; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Admin — Study Dashboard</h1>
        <p>
          This app is built with TanStack Start (SSR). The runnable site lives in the
          <code>dist/client</code> folder after running <code>npm run build</code>,
          and the dev server runs with <code>npm run dev</code>.
        </p>
        <p>This <code>index.html</code> is a placeholder so static hosts that look for a root index file don't 404.</p>
        <a class="btn" href="./dist/client/index.html">Open built app</a>
      </div>
    </div>
  </body>
</html>
